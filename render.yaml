services:
  - type: web
    name: codetrail-api
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run db:generate -w @codetrail/api && npm run build -w @codetrail/api
    preDeployCommand: npm run db:deploy -w @codetrail/api && npm run db:seed -w @codetrail/api
    startCommand: npm run start -w @codetrail/api
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: codetrail-db
          property: connectionString
      - key: CORS_ORIGIN
        value: "https://codetrail-web.onrender.com"

  - type: web
    name: codetrail-web
    runtime: static
    buildCommand: npm install --include=dev && npm run build -w @codetrail/web
    staticPublishPath: apps/web/dist
    envVars:
      - key: VITE_API_URL
        value: "https://codetrail-api.onrender.com"

databases:
  - name: codetrail-db
    plan: free
