services:
  - type: web
    name: codetrail-api
    runtime: node
    plan: free
    rootDir: apps/api
    buildCommand: npm install && npm run db:generate && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: codetrail-db
          property: connectionString
      - key: CORS_ORIGIN
        value: "*"

  - type: web
    name: codetrail-web
    runtime: static
    rootDir: apps/web
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: codetrail-api
          property: host

databases:
  - name: codetrail-db
    plan: free
